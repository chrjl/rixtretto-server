scalar JSON

type Query {
  countries(ids: [ID], filter: Filter): [Country]!
  origins(ids: [ID], filter: Filter): [Origin]!
  roasters(ids: [ID], filter: Filter): [Roaster]!
  roastedCoffees(ids: [ID], filter: Filter): [RoastedCoffee]!
  greenCoffees(ids: [ID], filter: Filter): [GreenCoffee]!
  hello(name: String): String
}

type Mutation {
  roasterCreate(input: RoasterInput!): RoasterMutationResult!
  roasterUpdate(id: ID, input: RoasterInput!): RoasterMutationResult!
  greenCoffeeCreate(input: GreenCoffeeInput!): GreenCoffeeMutationResult!
  greenCoffeeUpdate(
    id: ID
    input: GreenCoffeeInput!
  ): GreenCoffeeMutationResult!
  greenCoffeeTagAdd(
    id: ID!
    type: String!
    values: [String]!
  ): GreenCoffeeMutationResult!
  greenCoffeeTagDelete(
    id: ID!
    type: String!
    values: [String]
  ): GreenCoffeeMutationResult!
  roastedCoffeeCreate(input: RoastedCoffeeInput!): RoastedCoffeeMutationResult!
  roastedCoffeeUpdate(
    id: ID!
    input: RoastedCoffeeInput!
  ): RoastedCoffeeMutationResult!
  roastedCoffeeTagAdd(
    id: ID!
    type: String!
    values: [String]!
  ): RoastedCoffeeMutationResult!
  roastedCoffeeTagDelete(
    id: ID!
    type: String!
    values: [String]
  ): RoastedCoffeeMutationResult!
  roastedCoffeeComponentAdd(
    id: ID!
    input: CoffeeComponentInput
  ): CoffeeComponentMutationResult!
  roastedCoffeeComponentDelete(
    id: ID!
    input: CoffeeComponentInput
  ): CoffeeComponentMutationResult!
  roastedCoffeeComponentUpdate(
    id: ID!
    input: CoffeeComponentInput
  ): CoffeeComponentMutationResult!
}

type Error {
  code: Int!
  message: String
}

enum Process {
  WASHED
  NATURAL
  HONEY
  DECAF
}

enum Category {
  BLEND
  SINGLE
  DECAF
}

input LocationFilter {
  city: String
  state: String
  countryName: String
  countryId: ID
}

type Location {
  city: String
  state: String
  country: Country!
}

input LocationInput {
  city: String
  state: String
  countryId: ID
}

input NameFilter {
  starts_with: String
  contains: String
}

input CoffeeFilter {
  profiles: [String!]
  varieties: [String!]
  processes: [String!]
  tasting: [String!]
}

input Filter {
  name: NameFilter
  location: LocationFilter
  coffeeDetail: CoffeeFilter
}

type Country {
  id: ID!
  name: String!
  longName: String!

  origin: Origin

  "List of roasters that roast coffees from origins within the given country."
  roasters: [Roaster]!
  roastedCoffees: [RoastedCoffee]!
  greenCoffees: [GreenCoffee]!
}

type Origin {
  id: ID!
  type: String!
  name: String!
  processes: [String]!
  varieties: [String]!
  harvest_start: Int
  harvest_end: Int
  details: JSON

  parent: Origin
  children: [Origin]!
  suborigins: [Origin]!
  country: Country!
  roastedCoffees(filter: Filter): [RoastedCoffee]!
  greenCoffees(filter: Filter): [GreenCoffee]!

  "List of roasters that roast coffees from the given origin."
  roasters: [Roaster]!
  # roasters(filter: Filter): [Roaster]!
}
