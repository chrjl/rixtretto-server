scalar JSON

type Query {
  countries(ids: [ID], filter: Filter): [Country]!
  origins(ids: [ID], filter: Filter): [Origin]!
  roasters(ids: [ID], filter: Filter): [Roaster]!
  roastedCoffees(ids: [ID], filter: Filter): [RoastedCoffee]!
  greenCoffees(ids: [ID], filter: Filter): [GreenCoffee]!
  hello(name: String): String
}

type Mutation {
}

type Error {
  code: Int!
  message: String
}

enum Process {
  WASHED
  NATURAL
  HONEY
  DECAF
}

enum Category {
  BLEND
  SINGLE
  DECAF
}

input LocationFilter {
  city: String
  state: String
  countryName: String
  countryId: ID
}

type Location {
  city: String
  state: String
  country: Country!
}

input LocationInput {
  city: String
  state: String
  countryId: ID
}

input NameFilter {
  starts_with: String
  contains: String
}

input CoffeeFilter {
  profiles: [String!]
  varieties: [String!]
  processes: [String!]
  tasting: [String!]
}

input Filter {
  name: NameFilter
  location: LocationFilter
  coffeeDetail: CoffeeFilter
}

type Roaster {
  id: ID!
  name: String!
  location: Location
  equipment: RoastingEquipment
  details: JSON

  roastedCoffees: [RoastedCoffee]!
}

type RoastingEquipment {
  brand: String
  model: String
  capacity: Float
}

type Country {
  id: ID!
  name: String!
  longName: String!

  origin: Origin

  "List of roasters that roast coffees from origins within the given country."
  roasters: [Roaster]!
  roastedCoffees: [RoastedCoffee]!
  greenCoffees: [GreenCoffee]!
}

type Origin {
  id: ID!
  type: String!
  name: String!
  processes: [String]!
  varieties: [String]!
  harvest_start: Int
  harvest_end: Int
  details: JSON

  parent: Origin
  children: [Origin]!
  suborigins: [Origin]!
  country: Country!
  roastedCoffees(filter: Filter): [RoastedCoffee]!
  greenCoffees(filter: Filter): [GreenCoffee]!

  "List of roasters that roast coffees from the given origin."
  roasters(filter: Filter): [Roaster]!
}

type RoastedCoffee {
  id: ID!
  name: String!
  # prices: [Price]!

  roaster: Roaster
  profiles: [String]!
  origins: [Origin]!
  processes: [String]!
  varieties: [String]!
  tasting: [String]!
  components: [CoffeeComponent]!
}

type GreenCoffee {
  id: ID!
  name: String
  source: GreenCoffeeSource
  details: JSON

  origins: [Origin]!
  processes: [String]!
  varieties: [String]!
  tasting: [String]!
  associations: [CoffeeComponent]!
  roasters: [Roaster]!
}

type GreenCoffeeSource {
  name: String
  sourceType: String
  producerName: String
  harvestYear: Int
  country: Country
  origin: Origin
  community: String
}

type CoffeeComponent {
  roastedCoffee: RoastedCoffee!
  greenCoffee: GreenCoffee
  origin: Origin
  process: String
  fraction: Float
}
